name: Hub IDE sync check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - name: Verify Node lockfile (hub tools)
        run: npm ci
      - name: Verify Cursor mirrors match canonical commands and agents
        run: ./scripts/sync-ide-assets.sh --check
