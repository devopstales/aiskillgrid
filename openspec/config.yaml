schema: spec-driven

context: |
  Tech stack: Markdown-first workflow docs, shell automation scripts, multi-IDE prompt/rule packs (.cursor, .opencode, .kilo)
  Architecture: Command workflows in .agents/workflows/, reusable skills in .agents/skills/, templates in .skillgrid/templates/, docs in docs/, change artifacts in openspec/changes/
  Workflow model: Spec-driven development with /sdd-* commands, persona board reviews, and durable file-first artifacts
  Testing and quality: Verification-first gates, command-level validation, and repository hygiene checks
  Style: Keep workflow instructions explicit, deterministic, and phase-scoped; favor small reviewable slices

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky or high-blast-radius changes
    - List impacted commands, skills, rules, and docs sections before implementation
  specs:
    - Use Given/When/Then scenarios for behavior changes
    - Use RFC 2119 language (MUST, SHALL, SHOULD, MAY) for normative requirements
  design:
    - Document architecture decisions and tradeoffs for workflow-level changes
    - Include sequence/flow diagrams for complex multi-agent orchestration when needed
  tasks:
    - Group tasks by phase (infrastructure, implementation, verification, docs)
    - Keep each task completable in one focused session
  apply:
    - Follow existing repository conventions and naming patterns
    - Update related docs when command, skill, or workflow behavior changes
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before archiving destructive or large-removal deltas
    - Ensure verify evidence exists before archiving a completed change

testing:
  strict_tdd: true
  detected: "2026-05-09"
  runner:
    command: ""
    framework: "Project-specific verification commands"
  layers:
    unit:
      available: false
      tool: ""
      note: "No single language-specific unit test runner is enforced globally in this repository."
    integration:
      available: false
      tool: ""
      note: "Integration checks depend on the target implementation workspace and are configured per change."
    e2e:
      available: false
      tool: ""
      note: "No default repository-wide e2e command is defined."
    workflow:
      available: true
      tool: "/sdd-verify"
      note: "Verification evidence is generated through workflow commands and change artifacts."
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      note: "No repository-wide mandatory linter command is defined."
    type_checker:
      available: false
      command: ""
    formatter:
      available: false
      command: ""
