version: "3"

vars:
  SKILLGRID_CLI_DIR: skillgrid-cli
  # GitHub Packages npm registry (same URL for npm and bun publish)
  GITHUB_PACKAGES_REGISTRY: "https://npm.pkg.github.com"
  GITHUB_PACKAGES_OWNER: devopstales

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  hub:npm-ci:
    desc: Install pinned Node dependencies at repo root (npm ci)
    cmds:
      - npm ci

  hub:npm-install:
    desc: Install hub root dependencies (npm install)
    cmds:
      - npm install

  hub:test-skillgrid-dashboard:
    desc: Run Skillgrid dashboard tests (skillgrid-cli Vitest + MCP)
    cmds:
      - npm run test:skillgrid-dashboard

  skillgrid:deps:
    desc: Install skillgrid-cli Node dependencies (npm ci)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    cmds:
      - npm ci

  skillgrid:deps-install:
    desc: Install skillgrid-cli dependencies (npm install)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    cmds:
      - npm install

  skillgrid:build-tsc:
    desc: Typecheck skillgrid-cli only (no Bun binary)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    cmds:
      - npm run build:tsc

  skillgrid:build-binary:
    desc: Compile skillgrid-cli to bin/skillgrid (requires Bun on PATH)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    preconditions:
      - sh: command -v bun >/dev/null 2>&1
        msg: "Install Bun (https://bun.sh) and ensure it is on PATH, or run task skillgrid:build-tsc"
    cmds:
      - npm run build:binary

  skillgrid:build:
    desc: Typecheck + Bun-compile skillgrid-cli (npm run build; clones GitNexus for /gitnexus — Node 20+, git, network; use SKIP_GITNEXUS_WEB=1 to skip)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    preconditions:
      - sh: command -v bun >/dev/null 2>&1
        msg: "Install Bun (https://bun.sh) and ensure it is on PATH, or run task skillgrid:build-tsc"
    cmds:
      - npm ci
      - npm run build

  skillgrid:test:
    desc: Run skillgrid-cli unit tests (dashboard build + tsc + vitest + node --test)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    cmds:
      - npm test

  skillgrid:run:
    desc: "Run built skillgrid binary. Example: task skillgrid:run CLI_ARGS=\"install --help\""
    dir: "{{.SKILLGRID_CLI_DIR}}"
    vars:
      CLI_ARGS: ""
    preconditions:
      - sh: test -x ./bin/skillgrid
        msg: "Run task skillgrid:build first to create bin/skillgrid (requires Bun)."
    cmds:
      - ./bin/skillgrid {{.CLI_ARGS}}

  # --- GitHub Packages (skillgrid-cli) ---
  # Prereqs:
  #   - package.json name must be scoped: @<GITHUB_PACKAGES_OWNER>/skillgrid-cli (matches token owner/org).
  #   - "private": false in skillgrid-cli/package.json.
  #   - Auth token (first non-empty wins): NODE_AUTH_TOKEN, GITHUB_TOKEN, or GH_TOKEN (PAT with write:packages).
  #   - GITHUB_PACKAGES_OWNER: org or user name (same as npm scope); default devopstales in vars (publish tasks export it).
  # Bump version in skillgrid-cli/package.json before each publish. Use only ONE of npm or bun per version.
  #
  # Example (optional overrides before task):
  #   export NODE_AUTH_TOKEN="$(gh auth token)"   # or paste a classic PAT
  #   export GITHUB_PACKAGES_OWNER=other-org
  #   task skillgrid:publish-github-packages-npm

  skillgrid:publish-github-packages-npm:
    desc: Build skillgrid-cli and publish to GitHub Packages using npm (auth NODE_AUTH_TOKEN or GITHUB_TOKEN or GH_TOKEN; GITHUB_PACKAGES_OWNER)
    deps: [skillgrid:build]
    dir: "{{.SKILLGRID_CLI_DIR}}"
    cmds:
      - |
        set -e
        export GITHUB_PACKAGES_OWNER="{{.GITHUB_PACKAGES_OWNER}}"
        export NODE_AUTH_TOKEN="$(gh auth token)"
        NPM_GH_TOKEN="${NODE_AUTH_TOKEN:-${GITHUB_TOKEN:-${GH_TOKEN:-}}}"
        if [ -z "$NPM_GH_TOKEN" ]; then
          echo "No GitHub token: set NODE_AUTH_TOKEN, or GITHUB_TOKEN, or GH_TOKEN (PAT with write:packages for npm.pkg.github.com)."
          echo "Example: export NODE_AUTH_TOKEN=\"\$(gh auth token)\""
          exit 1
        fi
        : "${GITHUB_PACKAGES_OWNER:?Set GITHUB_PACKAGES_OWNER to your GitHub org or username (npm scope), e.g. export GITHUB_PACKAGES_OWNER=myorg}"
        node -e "const p=require('./package.json'); if(p.private) { console.error('Unset private in package.json'); process.exit(1); } if(!String(p.name).startsWith('@')) { console.error('package name must be scoped (@owner/pkg) for GitHub Packages'); process.exit(1); }"
        REG="{{.GITHUB_PACKAGES_REGISTRY}}"
        printf '%s\n' "@${GITHUB_PACKAGES_OWNER}:registry=${REG}" "//npm.pkg.github.com/:_authToken=${NPM_GH_TOKEN}" > .npmrc.github-packages
        npm publish --userconfig .npmrc.github-packages --access public --registry "${REG}"
        rm -f .npmrc.github-packages

  skillgrid:publish-github-packages-bun:
    desc: Build skillgrid-cli and publish to GitHub Packages using bun publish (same auth as npm task)
    deps: [skillgrid:build]
    dir: "{{.SKILLGRID_CLI_DIR}}"
    preconditions:
      - sh: command -v bun >/dev/null 2>&1
        msg: "Install Bun (https://bun.sh) for bun publish"
    cmds:
      - |
        set -e
        export GITHUB_PACKAGES_OWNER="{{.GITHUB_PACKAGES_OWNER}}"
        export NODE_AUTH_TOKEN="$(gh auth token)"
        NPM_GH_TOKEN="${NODE_AUTH_TOKEN:-${GITHUB_TOKEN:-${GH_TOKEN:-}}}"
        if [ -z "$NPM_GH_TOKEN" ]; then
          echo "No GitHub token: set NODE_AUTH_TOKEN, or GITHUB_TOKEN, or GH_TOKEN (PAT with write:packages)."
          exit 1
        fi
        : "${GITHUB_PACKAGES_OWNER:?Set GITHUB_PACKAGES_OWNER to your GitHub org or username (npm scope)}"
        node -e "const p=require('./package.json'); if(p.private) { console.error('Unset private in package.json'); process.exit(1); } if(!String(p.name).startsWith('@')) { console.error('package name must be scoped (@owner/pkg) for GitHub Packages'); process.exit(1); }"
        REG="{{.GITHUB_PACKAGES_REGISTRY}}"
        printf '%s\n' "@${GITHUB_PACKAGES_OWNER}:registry=${REG}" "//npm.pkg.github.com/:_authToken=${NPM_GH_TOKEN}" > .npmrc.github-packages
        NPM_CONFIG_USERCONFIG="$(pwd)/.npmrc.github-packages" bun publish --registry "${REG}" --access public
        rm -f .npmrc.github-packages

  skillgrid:publish-github-packages-npm-dry-run:
    desc: Dry-run npm publish to GitHub Packages (no deps on full build; uses current dist/bin if present)
    dir: "{{.SKILLGRID_CLI_DIR}}"
    cmds:
      - |
        set -e
        export GITHUB_PACKAGES_OWNER="{{.GITHUB_PACKAGES_OWNER}}"
        export NODE_AUTH_TOKEN="$(gh auth token)"
        NPM_GH_TOKEN="${NODE_AUTH_TOKEN:-${GITHUB_TOKEN:-${GH_TOKEN:-}}}"
        if [ -z "$NPM_GH_TOKEN" ]; then
          echo "No GitHub token: set NODE_AUTH_TOKEN, or GITHUB_TOKEN, or GH_TOKEN."
          exit 1
        fi
        : "${GITHUB_PACKAGES_OWNER:?Set GITHUB_PACKAGES_OWNER}"
        REG="{{.GITHUB_PACKAGES_REGISTRY}}"
        printf '%s\n' "@${GITHUB_PACKAGES_OWNER}:registry=${REG}" "//npm.pkg.github.com/:_authToken=${NPM_GH_TOKEN}" > .npmrc.github-packages
        npm publish --userconfig .npmrc.github-packages --access public --registry "${REG}" --dry-run
        rm -f .npmrc.github-packages

  test:
    desc: Run skillgrid-cli tests (includes dashboard asset tests)
    cmds:
      - task skillgrid:test

  install-sh-help:
    desc: Show legacy bash installer help
    cmds:
      - ./install.sh --help
